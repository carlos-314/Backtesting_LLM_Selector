name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

# Concurrencia: cancelar runs duplicados en la misma rama
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (tests + cobertura)
    runs-on: ubuntu-latest

    # Postgres + el schema legacy de análisis de test viven en servicios
    # contenedor durante el job. (Redis no se levanta: la tarea arq se
    # prueba invocando run_backtest directo, sin pasar por el broker.)
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: backtesting_app
          POSTGRES_USER: backtesting
          POSTGRES_PASSWORD: backtesting_dev
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U backtesting"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Sobrescribe el default local del .env (que no se commitea) para CI.
      APP_DATABASE_URL: postgresql+asyncpg://backtesting:backtesting_dev@localhost:55432/backtesting_app
      ANALYSIS_DATABASE_URL: ""  # los tests crean su propia BBDD de test
      JWT_SECRET: ci-test-secret
      GOOGLE_CLIENT_ID: ci-test-client-id
      INITIAL_ADMIN_EMAIL: ""

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"
          pip install pytest-cov

      - name: Create analysis test DB
        run: |
          PGPASSWORD=backtesting_dev psql -h localhost -p 55432 -U backtesting -d backtesting_app \
            -c "CREATE DATABASE backtesting_analysis_test;"

      - name: Apply Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run backend test suite (coverage)
        working-directory: backend
        run: pytest tests/ --cov=app --cov-branch --cov-report=term --cov-report=xml -q

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: TypeScript typecheck
        working-directory: frontend
        run: npx tsc -b --noEmit

      - name: Build (Vite)
        working-directory: frontend
        run: npm run build
