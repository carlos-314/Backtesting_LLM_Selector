services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: backtesting
      POSTGRES_USER: backtesting
      POSTGRES_PASSWORD: backtesting_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backtesting"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://backtesting:backtesting_dev@postgres:5432/backtesting
      DATABASE_URL_SYNC: postgresql://backtesting:backtesting_dev@postgres:5432/backtesting
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: uploads
      MINIO_USE_SSL: "false"
      JWT_SECRET: dev-secret-change-in-production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      CORS_ORIGINS: '["http://localhost:5173"]'
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks worker -l info -Q parse,prices,backtest
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://backtesting:backtesting_dev@postgres:5432/backtesting
      DATABASE_URL_SYNC: postgresql://backtesting:backtesting_dev@postgres:5432/backtesting
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: uploads
      MINIO_USE_SSL: "false"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks beat -l info
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://backtesting:backtesting_dev@postgres:5432/backtesting
      DATABASE_URL_SYNC: postgresql://backtesting:backtesting_dev@postgres:5432/backtesting
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: ""
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}

volumes:
  postgres-data:
  minio-data:
